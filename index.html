<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IND TECH | REGISTRATION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Cabinet+Grotesk:wght@800;900&family=Syncopate:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Themes from Delivery Page --- */
        :root {
            --bg: #f5f5f7; 
            --glass-bg: rgba(255, 255, 255, 0.22); 
            --glass-border: rgba(255, 255, 255, 0.5); 
            --glass-shadow: rgba(0, 0, 0, 0.05); 
            --glass-highlight: rgba(255, 255, 255, 0.9); 
            --text-main: #1d1d1f; 
            --text-dim: #86868b; 
            --input-bg: rgba(255, 255, 255, 0.7); 
            --accent: #0071e3; 
            --accent-glow: rgba(0, 113, 227, 0.2); 
            --shadow: rgba(0, 0, 0, 0.02);
            --blob-1: #dbdaea; --blob-2: #d2e3fc; --blob-3: #e2f4f2;
        }
        [data-theme="dark"] {
            --bg: #000000; 
            --glass-bg: rgba(30, 30, 35, 0.35); 
            --glass-border: rgba(255, 255, 255, 0.15); 
            --glass-shadow: rgba(0, 0, 0, 0.6); 
            --glass-highlight: rgba(255, 255, 255, 0.25); 
            --text-main: #f2f2f7; 
            --text-dim: #aeaeae; 
            --input-bg: rgba(255, 255, 255, 0.05); 
            --accent: #0a84ff; 
            --accent-glow: rgba(10, 132, 255, 0.4); 
            --shadow: rgba(0, 0, 0, 0.4);
            --blob-1: #bf5af2; --blob-2: #0a84ff; --blob-3: #ff9f0a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.5s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden; }
        
        /* --- Ambient Blobs Background --- */
        .ambient-container { position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; z-index: -1; pointer-events: none; filter: blur(70px); opacity: 0.85; }
        .blob { position: absolute; width: 320px; height: 320px; border-radius: 50%; mix-blend-mode: multiply; animation: orbit 25s infinite linear; }
        [data-theme="dark"] .ambient-container { opacity: 0.35; filter: blur(110px); }
        .blob-one { background: var(--blob-1); top: 10%; left: 15%; animation-duration: 25s; }
        .blob-two { background: var(--blob-2); bottom: 15%; right: 10%; animation-duration: 30s; animation-direction: reverse; }
        .blob-three { background: var(--blob-3); top: 45%; left: 35%; animation-duration: 22s; }

        @keyframes orbit {
            0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
            33% { transform: translate(120px, 80px) scale(1.1) rotate(120deg); }
            66% { transform: translate(-70px, 130px) scale(0.9) rotate(240deg); }
            100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
        }

        /* --- Header & Tabs --- */
        header { background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%); padding: 18px 5%; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 30px var(--glass-shadow), inset 0 1px 1px var(--glass-highlight); }
        .brand { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 2px; }
        .brand span { color: var(--accent); }
        .theme-toggle { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; cursor: pointer; box-shadow: inset 0 1px 1px var(--glass-highlight); }
        
        .nav-tabs { display: flex; background: var(--glass-bg); margin: 20px 4%; padding: 5px; border-radius: 99px; border: 1px solid var(--glass-border); gap: 5px; box-shadow: 0 10px 30px var(--glass-shadow); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; border-radius: 99px; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; text-decoration: none; }
        .tab.active { background: var(--input-bg); color: var(--accent); border: 1px solid var(--glass-border); }
        
        main { padding: 0 4%; position: relative; z-index: 1; display: flex; justify-content: center; }
        
        /* --- Forms & Glass Panels --- */
        .form-container { width: 100%; max-width: 600px; }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 20px; padding: 22px; margin-bottom: 15px; box-shadow: 0 15px 35px var(--glass-shadow), inset 0 1px 1px var(--glass-highlight); }
        
        .board-item { background: rgba(0,0,0,0.02); border: 1px dashed var(--glass-border); box-shadow: none; position: relative; }
        [data-theme="dark"] .board-item { background: rgba(255,255,255,0.02); }

        .flex-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-group > div { flex: 1; min-width: 130px; }

        label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; margin-left: 4px; display: block; letter-spacing: 0.5px; }
        
        input, select, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 14px; color: var(--text-main); font-size: 14px; margin-bottom: 16px; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input[readonly] { color: var(--accent); font-weight: 700; }

        .action-btn { width: 100%; background: var(--accent); color: #fff; padding: 15px; border: none; border-radius: 14px; font-weight: 700; font-size: 12px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 12px var(--accent-glow); margin-top: 10px; }
        .outline-btn { background: var(--glass-bg); color: var(--text-main); border: 1px dashed var(--glass-border); box-shadow: none; margin-bottom: 10px; margin-top: 0; }
        
        .remove-btn { position: absolute; top: 15px; right: 15px; border: none; background: transparent; color: #ff3b30; font-weight: 700; font-size: 10px; cursor: pointer; padding: 5px; border-radius: 8px; }
        .remove-btn:hover { background: rgba(255, 59, 48, 0.1); }
    </style>
</head>
<body>

<div class="ambient-container">
    <div class="blob blob-one"></div>
    <div class="blob blob-two"></div>
    <div class="blob blob-three"></div>
</div>

<header>
    <div class="brand">IND TECH <span>CORE</span></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓 DARK MODE</button>
</header>

<div class="nav-tabs">
    <a href="index.html" class="tab active">Register</a>
    <a href="delivery.html" class="tab">Delivery</a>
    <a href="history.html" class="tab">History</a>
</div>

<main>
    <div class="form-container">
        
        <div class="glass-panel">
            <div class="flex-group">
                <div>
                    <label>Tag ID</label>
                    <input type="text" id="tagNo" readonly placeholder="FETCHING...">
                </div>
                <div>
                    <label>Gate Pass</label>
                    <input type="text" id="gatePass" placeholder="GP-000">
                </div>
            </div>
            
            <label>Client Full Name</label>
            <input type="text" id="client" placeholder="Enter Full Client Name" required>
        </div>

        <div id="boardsContainer">
            <div class="glass-panel board-item">
                <label style="color: var(--text-main); font-size: 12px; margin-bottom: 12px;">Board Details</label>
                
                <label>Hardware Model</label>
                <input type="text" class="bModel" placeholder="e.g. H61 / G41 / RTX 3060">
                
                <div class="flex-group">
                    <div>
                        <label>Part Details</label>
                        <input type="text" class="bPart">
                    </div>
                    <div>
                        <label>Serial Number</label>
                        <input type="text" class="bSerial">
                    </div>
                </div>
                
                <label>Issue / Fault Description</label>
                <input type="text" class="bIssue" placeholder="Describe the hardware problem...">
                
                <label>Internal Remark</label>
                <input type="text" class="bRemark" placeholder="Optional internal notes">
            </div>
        </div>
        
        <button class="action-btn outline-btn" onclick="addBoard()">+ Attach Another Board</button>
        <button class="action-btn" id="saveBtn" onclick="saveData()">Register Job Log</button>
        
    </div>
</main>

<script>
    // --- Theme Control (Synced with Delivery Page) ---
    window.onload = () => {
        if(localStorage.getItem('theme') === 'dark') { 
            document.documentElement.setAttribute('data-theme', 'dark'); 
            document.getElementById('themeBtn').innerText = "☀️ LIGHT MODE"; 
        }

        // Fetch Next Tag automatically
        fetch(scriptURL + "?action=getNextTag")
            .then(r => r.text())
            .then(t => { document.getElementById('tagNo').value = t; })
            .catch(e => { document.getElementById('tagNo').value = "ERROR"; }); 
    };

    function toggleTheme() {
        if(document.documentElement.getAttribute('data-theme') === 'dark') {
            document.documentElement.removeAttribute('data-theme'); 
            localStorage.setItem('theme', 'light'); 
            document.getElementById('themeBtn').innerText = "🌓 DARK MODE";
        } else {
            document.documentElement.setAttribute('data-theme', 'dark'); 
            localStorage.setItem('theme', 'dark'); 
            document.getElementById('themeBtn').innerText = "☀️ LIGHT MODE";
        }
    }

    // --- Backend URL ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWdj8Jw_WDSrZx4pQTp2cqqDpWUoMLg32Aqk-bdIalxRYXDw5d1kkN9idO7IeQpMUrOw/exec';

    // --- Add Multiple Boards Logic ---
    function addBoard() {
        const div = document.createElement('div'); 
        div.className = 'glass-panel board-item';
        div.innerHTML = `
            <button class="remove-btn" onclick="this.parentElement.remove()">✕ REMOVE</button>
            <label style="color: var(--text-main); font-size: 12px; margin-bottom: 12px; margin-top: 5px;">Extra Board Details</label>
            <label>Hardware Model</label>
            <input type="text" class="bModel" placeholder="e.g. H61 / G41 / RTX 3060">
            <div class="flex-group">
                <div><label>Part Details</label><input type="text" class="bPart"></div>
                <div><label>Serial Number</label><input type="text" class="bSerial"></div>
            </div>
            <label>Issue / Fault Description</label><input type="text" class="bIssue" placeholder="Describe the hardware problem...">
            <label>Internal Remark</label><input type="text" class="bRemark" placeholder="Optional internal notes">`;
        document.getElementById('boardsContainer').appendChild(div);
    }

    // --- Save Data Logic ---
    function saveData() {
        const client = document.getElementById('client').value.toUpperCase();
        if(!client) return alert("CLIENT NAME REQUIRED!");
        
        const boards = [];
        document.querySelectorAll('#boardsContainer .board-item').forEach((item, i) => {
            boards.push({
                tag: document.getElementById('tagNo').value + "-" + String(i + 1).padStart(2, '0'),
                model: item.querySelector('.bModel').value.toUpperCase(),
                part: item.querySelector('.bPart').value.toUpperCase(),
                serial: item.querySelector('.bSerial').value.toUpperCase(),
                issue: item.querySelector('.bIssue').value.toUpperCase(),
                remark: item.querySelector('.bRemark').value.toUpperCase()
            });
        });
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Syncing Database...";
        btn.disabled = true;

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ 
                action: "saveEntry", 
                client: client, 
                gatepass: document.getElementById('gatePass').value, 
                boards: boards 
            })
        })
        .then(() => { 
            alert("JOB REGISTERED SUCCESSFULLY!"); 
            location.reload(); 
        })
        .catch(() => {
            alert("Error syncing to cloud.");
            btn.innerText = "Register Job Log";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
