<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IND TECH | HISTORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Cabinet+Grotesk:wght@800;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7; 
            --glass-bg: rgba(255, 255, 255, 0.22); 
            --glass-border: rgba(255, 255, 255, 0.5); 
            --glass-shadow: rgba(0, 0, 0, 0.05); 
            --glass-highlight: rgba(255, 255, 255, 0.9); 
            --text-main: #1d1d1f; 
            --text-dim: #86868b; 
            --input-bg: rgba(255, 255, 255, 0.7); 
            --accent: #34c759; 
            --accent-glow: rgba(52, 199, 89, 0.2); 
            --shadow: rgba(0, 0, 0, 0.02);
            --blob-1: #dbdaea; --blob-2: #d2e3fc; --blob-3: #e2f4f2;
        }
        [data-theme="dark"] {
            --bg: #000000; 
            --glass-bg: rgba(30, 30, 35, 0.35); 
            --glass-border: rgba(255, 255, 255, 0.15); 
            --glass-shadow: rgba(0, 0, 0, 0.6); 
            --glass-highlight: rgba(255, 255, 255, 0.25); 
            --text-main: #f2f2f7; 
            --text-dim: #aeaeae; 
            --input-bg: rgba(255, 255, 255, 0.05); 
            --accent: #30d158; 
            --accent-glow: rgba(48, 209, 88, 0.4); 
            --shadow: rgba(0, 0, 0, 0.4);
            --blob-1: #bf5af2; --blob-2: #0a84ff; --blob-3: #ff9f0a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.5s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden; }
        
        .ambient-container { position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; z-index: -1; pointer-events: none; filter: blur(70px); opacity: 0.85; }
        .blob { position: absolute; width: 320px; height: 320px; border-radius: 50%; mix-blend-mode: multiply; animation: orbit 25s infinite linear; }
        [data-theme="dark"] .ambient-container { opacity: 0.35; filter: blur(110px); }
        .blob-one { background: var(--blob-1); top: 10%; left: 15%; animation-duration: 25s; }
        .blob-two { background: var(--blob-2); bottom: 15%; right: 10%; animation-duration: 30s; animation-direction: reverse; }
        .blob-three { background: var(--blob-3); top: 45%; left: 35%; animation-duration: 22s; }

        @keyframes orbit {
            0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
            33% { transform: translate(120px, 80px) scale(1.1) rotate(120deg); }
            66% { transform: translate(-70px, 130px) scale(0.9) rotate(240deg); }
            100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
        }

        header { background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%); padding: 18px 5%; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 30px var(--glass-shadow), inset 0 1px 1px var(--glass-highlight); }
        .brand { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 2px; }
        .brand span { color: var(--accent); }
        .theme-toggle { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; cursor: pointer; box-shadow: inset 0 1px 1px var(--glass-highlight); }
        
        .nav-tabs { display: flex; background: var(--glass-bg); margin: 20px 4%; padding: 5px; border-radius: 99px; border: 1px solid var(--glass-border); gap: 5px; box-shadow: 0 10px 30px var(--glass-shadow); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; border-radius: 99px; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; text-decoration: none; }
        .tab.active { background: var(--input-bg); color: var(--accent); border: 1px solid var(--glass-border); }
        
        main { padding: 0 4%; position: relative; z-index: 1; }
        .search-input { width: 100%; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 14px; padding: 15px; color: var(--text-main); font-size: 14px; margin-bottom: 15px; outline: none; }
        
        .liquid-leader-card { background: var(--glass-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: 0 15px 35px var(--glass-shadow), inset 0 1px 1px var(--glass-highlight); cursor: pointer; position: relative; overflow: hidden; transform: scale(1); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.4s, box-shadow 0.4s; }
        .liquid-leader-card.active-glow { border-color: var(--accent); box-shadow: 0 20px 40px var(--glass-shadow), 0 0 25px var(--accent-glow), inset 0 1px 1px var(--glass-highlight); transform: scale(1.015); }
        
        .card-header-view { display: flex; justify-content: space-between; align-items: flex-start; }
        .c-main { display: flex; flex-direction: column; width: 65%; }
        
        .c-name { font-family: 'Cabinet Grotesk', -apple-system, sans-serif; font-size: 18px; font-weight: 900; color: var(--text-main); letter-spacing: -0.2px; margin-bottom: 6px; text-transform: uppercase; line-height: 1.2; }
        .c-hardware-meta { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-top: 2px; display: flex; gap: 4px; }
        .c-hardware-meta span { color: var(--text-main); font-weight: 600; }
        
        .c-side { width: 35%; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .tag-lbl { font-size: 10px; font-weight: 700; color: #fff; background: #34c759; padding: 3px 10px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; }
        
        /* প্রাইভেসি এমাউন্ট কন্টেইনার */
        .secure-amount-box { 
            font-size: 13px; 
            font-weight: 800; 
            color: var(--text-main); 
            background: var(--input-bg); 
            padding: 4px 10px; 
            border-radius: 8px; 
            border: 1px solid var(--glass-border); 
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            user-select: none;
        }
        .secure-amount-box span.hidden-state { filter: blur(4px); opacity: 0.6; font-size: 11px; letter-spacing: 1px; }

        .collapsible-detail { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.25, 1, 0.5, 1); background: rgba(0,0,0,0.01); border-radius: 12px; }
        .collapsible-detail.open { max-height: 200px; padding: 14px; margin-top: 14px; border: 1px solid var(--glass-border); }
        .detail-item { font-size: 12px; margin-bottom: 4px; color: var(--text-dim); }
        .detail-item strong { color: var(--text-main); }
    </style>
</head>
<body>

<div class="ambient-container">
    <div class="blob blob-one"></div>
    <div class="blob blob-two"></div>
    <div class="blob blob-three"></div>
</div>

<header>
    <div class="brand">IND TECH <span>LOGS</span></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓 DARK MODE</button>
</header>

<div class="nav-tabs">
    <a href="index.html" class="tab">Register</a>
    <a href="delivery.html" class="tab">Delivery</a>
    <a href="history.html" class="tab active">History</a>
</div>

<main>
    <input type="text" id="mSearch" onkeyup="filterCards()" class="search-input" placeholder="Search archive by client, invoice, status...">
    <div id="loading" style="text-align: center; font-size: 13px; color: var(--text-dim); margin-top: 15px;">Decoding Archive Logs...</div>
    <div id="cardsList"></div>
</main>

<script>
    // ওরিজিনাল স্ক্রিপ্ট URL যা আপনার ডাটাবেজের সাথে কানেক্টেড ছিল
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWdj8Jw_WDSrZx4pQTp2cqqDpWUoMLg32Aqk-bdIalxRYXDw5d1kkN9idO7IeQpMUrOw/exec';
    
    window.onload = () => {
        if(localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('themeBtn').innerText = "☀️ LIGHT MODE"; }
        
        // ওরিজিনাল getHistory অ্যাকশন মেথড কলিং রিস্টোর করা হলো
        fetch(scriptURL + "?action=getHistory").then(r => r.json()).then(data => {
            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('cardsList');
            if(!data || data.length === 0){ list.innerHTML = "<p style='text-align:center; color:var(--text-dim);'>Archive is empty</p>"; return; }
            data.forEach(i => {
                const card = document.createElement('div'); card.className = 'liquid-leader-card';
                card.setAttribute('onclick', 'toggleCard(this)');
                card.innerHTML = `
                    <div class="card-header-view">
                        <div class="c-main">
                            <span class="c-name">${i.client}</span>
                            <div class="c-hardware-meta">Board: <span>${i.model}</span></div>
                            <div class="c-hardware-meta">Invoice: <span>${i.invoice || 'N/A'}</span></div>
                        </div>
                        <div class="c-side">
                            <span class="tag-lbl">${i.payment || 'DISPATCHED'}</span>
                            <div class="secure-amount-box" onclick="toggleAmountPrivacy(event, this, '${i.amount || '0'}')">
                                👁️ <span class="hidden-state">•••• ৳</span>
                            </div>
                        </div>
                    </div>
                    <div class="collapsible-detail">
                        <div class="detail-item"><strong>Fault Fixed:</strong> ${i.issue || 'N/A'}</div>
                        <div class="detail-item"><strong>Receiver Person:</strong> ${i.receiver || 'N/A'}</div>
                        <div class="detail-item"><strong>Initial Note:</strong> ${i.remark || 'None'}</div>
                    </div>`;
                list.appendChild(card);
            });
        });
    };

    function toggleAmountPrivacy(event, element, realAmount) {
        event.stopPropagation();
        const textSpan = element.querySelector('span');
        if (textSpan.classList.contains('hidden-state')) {
            textSpan.innerText = realAmount + " ৳";
            textSpan.classList.remove('hidden-state');
            element.style.borderColor = "var(--accent)";
        } else {
            textSpan.innerText = "•••• ৳";
            textSpan.classList.add('hidden-state');
            element.style.borderColor = "var(--glass-border)";
        }
    }

    function toggleTheme() {
        if(document.documentElement.getAttribute('data-theme') === 'dark') {
            document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); document.getElementById('themeBtn').innerText = "🌓 DARK MODE";
        } else {
            document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); document.getElementById('themeBtn').innerText = "☀️ LIGHT MODE";
        }
    }

    function toggleCard(el) { 
        document.querySelectorAll('.liquid-leader-card').forEach(c => { if(c !== el) c.classList.remove('active-glow'); });
        el.classList.toggle('active-glow');
        el.querySelector('.collapsible-detail').classList.toggle('open'); 
    }

    function filterCards() {
        const f = document.getElementById('mSearch').value.toUpperCase();
        document.querySelectorAll('.liquid-leader-card').forEach(c => {
            c.style.display = c.innerText.toUpperCase().indexOf(f) > -1 ? "" : "none";
        });
    }
</script>
</body>
</html>
