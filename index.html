<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IND TECH | REGISTRATION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Hind+Siliguri:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --accent: #d4af37; /* Metallic Gold */
            --accent-glow: rgba(212, 175, 55, 0.3);
            --purple-glow: rgba(124, 58, 237, 0.2);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #00f5a0;
            --danger: #ff4b2b;
        }

        /* --- Global Smoothness --- */
        * { 
            box-sizing: border-box; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, var(--purple-glow) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, var(--accent-glow) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* --- Header & Brand --- */
        header {
            padding: 25px 8%;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand span { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        /* --- High-End Nav Tabs (Converted to Links) --- */
        .nav-tabs {
            display: flex;
            background: var(--panel);
            margin: 30px 8%;
            padding: 8px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            border-radius: 18px;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: block;
        }

        .tab.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        .tab:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        main { padding: 0 8% 100px; display: flex; justify-content: center; }
        
        .form-container { width: 100%; max-width: 800px; }

        /* --- Card & Forms --- */
        .card {
            background: var(--panel);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        label {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
            margin-left: 5px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 18px;
            color: white;
            font-size: 14px;
            margin-bottom: 25px;
            transition: 0.3s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* --- Premium Buttons --- */
        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            box-shadow: 0 10px 25px var(--accent-glow);
            animation: pulse 2s infinite;
        }

        .btn-primary:hover {
            background: #fff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<header>
    <div class="brand">IND TECH <span>ERP CORE</span></div>
    <div id="status" style="width: 12px; height: 12px; background: var(--success); border-radius: 50%; box-shadow: 0 0 15px var(--success);"></div>
</header>

<div class="nav-tabs">
    <a href="index.html" class="tab active">Registration</a>
    <a href="delivery.html" class="tab">Delivery</a>
    <a href="history.html" class="tab">Audit History</a>
</div>

<main>
    <div class="form-container">
        <div class="card">
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label>TAG ID</label>
                    <input type="text" id="tagNo" readonly placeholder="FETCHING..." style="color: var(--accent); font-weight: 800; border-color: var(--accent);">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>GATE PASS</label>
                    <input type="text" id="gatePass" placeholder="GP-000">
                </div>
            </div>
            
            <label>CLIENT FULL NAME</label>
            <input type="text" id="client" placeholder="TYPE NAME HERE...">
            
            <div id="boardsContainer">
                <div class="card board-item" style="background: rgba(255,255,255,0.02); border-style: dashed; padding: 25px;">
                    <label>BOARD MODEL</label>
                    <input type="text" class="bModel" placeholder="ENTER MODEL">
                    
                    <div style="display:flex; gap:15px; flex-wrap: wrap;">
                        <div style="flex:1; min-width: 150px;"><label>PART</label><input type="text" class="bPart"></div>
                        <div style="flex:1; min-width: 150px;"><label>SERIAL NO</label><input type="text" class="bSerial"></div>
                    </div>
                    
                    <label>ISSUE / FAULT</label>
                    <input type="text" class="bIssue">
                    
                    <label>REMARKS</label>
                    <input type="text" class="bRemark">
                </div>
            </div>
            
            <button class="btn" style="background: rgba(255,255,255,0.05); color: white; margin-bottom: 20px; border: 1px solid var(--glass-border);" onclick="addBoard()">+ ATTACH ANOTHER BOARD</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveData()">🚀 SYNC DATA TO CLOUD</button>
        </div>
    </div>
</main>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWdj8Jw_WDSrZx4pQTp2cqqDpWUoMLg32Aqk-bdIalxRYXDw5d1kkN9idO7IeQpMUrOw/exec';

    // Auto-fetch TAG ID when page loads
    window.onload = () => { 
        fetch(scriptURL + "?action=getNextTag")
            .then(r => r.text())
            .then(t => { document.getElementById('tagNo').value = t; })
            .catch(e => { 
                console.error("Error fetching Tag ID");
                document.getElementById('tagNo').value = "CONNECTION ERROR"; 
            }); 
    };

    // Add multiple boards function
    function addBoard() {
        const div = document.createElement('div'); 
        div.className = 'card board-item';
        div.style.background = 'rgba(255,255,255,0.01)'; 
        div.style.borderStyle = 'dashed'; 
        div.style.padding = '20px';
        
        div.innerHTML = `
            <button onclick="this.parentElement.remove()" style="float:right; border:none; background:none; color:var(--danger); font-weight:bold; font-size:10px; cursor:pointer; margin-bottom: 10px;">✕ REMOVE</button>
            <div style="clear: both;"></div>
            <label>MODEL</label><input type="text" class="bModel">
            <div style="display:flex; gap:12px; flex-wrap: wrap;">
                <div style="flex:1; min-width: 150px;"><label>PART</label><input type="text" class="bPart"></div>
                <div style="flex:1; min-width: 150px;"><label>SERIAL</label><input type="text" class="bSerial"></div>
            </div>
            <label>ISSUE</label><input type="text" class="bIssue">
            <label>REMARKS</label><input type="text" class="bRemark">`;
            
        document.getElementById('boardsContainer').appendChild(div);
    }

    // Save Data to Google Sheets
    function saveData() {
        const client = document.getElementById('client').value.toUpperCase();
        if(!client) return alert("CLIENT NAME REQUIRED!");
        
        const boards = [];
        document.querySelectorAll('.board-item').forEach((item, i) => {
            boards.push({
                tag: document.getElementById('tagNo').value + "-" + String(i + 1).padStart(2, '0'),
                model: item.querySelector('.bModel').value.toUpperCase(),
                part: item.querySelector('.bPart').value.toUpperCase(),
                serial: item.querySelector('.bSerial').value.toUpperCase(),
                issue: item.querySelector('.bIssue').value.toUpperCase(),
                remark: item.querySelector('.bRemark').value.toUpperCase()
            });
        });
        
        document.getElementById('saveBtn').innerText = "⏳ CLOUD SYNCING...";
        
        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ 
                action: "saveEntry", 
                client: client, 
                gatepass: document.getElementById('gatePass').value, 
                boards: boards 
            })
        })
        .then(() => { 
            alert("SUCCESSFULLY SAVED!"); 
            location.reload(); 
        })
        .catch(error => {
            alert("Error syncing to cloud.");
            document.getElementById('saveBtn').innerText = "🚀 SYNC DATA TO CLOUD";
        });
    }
</script>
</body>
</html>
