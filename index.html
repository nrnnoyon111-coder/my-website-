<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IND TECH | ERP CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           ১. APPLE LIQUID GLASS THEME VARIABLES
           ========================================= */
        :root {
            --bg-color: #e5e5ea;
            --blob-1: #ff2a5f;
            --blob-2: #007aff;
            --blob-3: #ff9500;
            --blob-opacity: 0.6;
            
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(0, 0, 0, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.8);
            --glass-caustic: rgba(255, 255, 255, 0.4);
            --reflection-start: rgba(255, 255, 255, 0.6);
            --reflection-end: rgba(255, 255, 255, 0.0);
            --glare-color: rgba(255, 255, 255, 0.4);
            
            --input-bg: rgba(255, 255, 255, 0.5);
            --text-main: #1d1d1f;
            --text-dim: #86868b;
            --accent-gold: #f1c40f;
            --btn-gold: #e6b800;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --blob-1: #bf5af2;
            --blob-2: #0a84ff;
            --blob-3: #ff375f;
            --blob-opacity: 0.4;
            
            --glass-bg: rgba(30, 30, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: rgba(0, 0, 0, 0.6);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --glass-caustic: rgba(255, 255, 255, 0.03);
            --reflection-start: rgba(255, 255, 255, 0.12);
            --reflection-end: rgba(255, 255, 255, 0.0);
            --glare-color: rgba(255, 255, 255, 0.15);
            
            --input-bg: rgba(0, 0, 0, 0.3);
            --text-main: #f2f2f7;
            --text-dim: #aeaeae;
            --accent-gold: #f1c40f;
            --btn-gold: #f1c40f;
        }

        /* =========================================
           ২. GLOBALES SETUP & BACKGROUND MESH
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 40px;
            transition: background 0.8s ease;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: var(--blob-opacity);
            animation: float 25s infinite alternate ease-in-out;
            will-change: transform;
            transition: background 0.8s ease, opacity 0.8s ease;
        }

        .blob-1 { width: 60vw; height: 60vw; top: -15%; left: -15%; background: var(--blob-1); }
        .blob-2 { width: 55vw; height: 55vw; bottom: -15%; right: -15%; background: var(--blob-2); animation-delay: -5s; }
        .blob-3 { width: 45vw; height: 45vw; top: 25%; left: 30%; background: var(--blob-3); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(8%, 12%) scale(1.08) rotate(10deg); }
            100% { transform: translate(-5%, -8%) scale(0.95) rotate(-10deg); }
        }

        /* =========================================
           ৩. HEADER NAVIGATION LOOK WITH MODE TOGGLE
           ========================================= */
        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px 10px 10px;
            margin-top: 10px;
        }

        .brand {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .brand span {
            color: var(--accent-gold);
            font-weight: 900;
        }

        .theme-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }

        /* ওরিজনাল ওল্ড স্টাইল মেনু ট্যাব */
        .nav-tabs {
            display: flex;
            width: 100%;
            max-width: 480px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 10px 5px;
            text-align: center;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            text-decoration: none;
        }

        .tab.active {
            background: var(--accent-gold);
            color: #000;
        }

        /* =========================================
           ৪. LIQUID GLASS CONTAINER & GLARE
           ========================================= */
        .liquid-nav {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            box-shadow: 
                0 40px 80px -20px var(--glass-shadow),
                0 10px 30px -10px var(--glass-shadow),
                inset 0 2px 3px -1px var(--glass-highlight),
                inset 0 -2px 4px -1px var(--glass-caustic),
                inset 0 0 0 1px var(--glass-border);
            z-index: 10;
        }

        /* Aqua Reflexion Effect (Luminous Edge) */
        .liquid-nav::before {
            content: '';
            position: absolute;
            top: 1px; left: 1px; right: 1px; height: 35%;
            border-radius: 28px 28px 16px 16px;
            background: linear-gradient(180deg, var(--reflection-start) 0%, var(--reflection-end) 100%);
            pointer-events: none;
            z-index: 6;
        }

        .liquid-glare-container {
            position: absolute;
            inset: 0;
            border-radius: 28px;
            overflow: hidden;
            pointer-events: none;
            z-index: 5;
        }
        
        .liquid-glare {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: radial-gradient(circle 120px at var(--x, 50%) var(--y, 50%), var(--glare-color) 0%, transparent 100%);
            mix-blend-mode: overlay;
        }
        
        .liquid-nav:hover .liquid-glare { opacity: 1; }

        /* =========================================
           ৫. FORM INTERFACES
           ========================================= */
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
            z-index: 7;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-main);
            font-size: 13px;
            outline: none;
            font-weight: 500;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 8px rgba(241, 196, 15, 0.2);
        }

        .gold-border {
            border: 1px solid var(--accent-gold);
        }

        /* =========================================
           ৬. MULTI-BOARD ATTACHMENTS & BUTTONS
           ========================================= */
        .board-block {
            border: 1px dashed var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            margin-top: 14px;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.1);
            position: relative;
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .board-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .btn-cancel {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff453a;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-cancel:hover { background: #ff453a; color: #fff; }

        .btn-attach {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 16px;
            z-index: 7;
            position: relative;
        }

        .submit-btn {
            width: 100%;
            background: var(--btn-gold);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2);
            z-index: 7;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <div class="brand">IND TECH <span>ERP CORE</span></div>
        <button class="theme-btn" id="themeBtn">🌓 Toggle Theme</button>
    </header>

    <div class="nav-tabs">
        <div class="tab active">REGISTRATION</div>
        <div class="tab">DELIVERY</div>
        <div class="tab">AUDIT HISTORY</div>
    </div>

    <nav class="liquid-nav" id="nav">
        <div class="liquid-glare-container">
            <div class="liquid-glare" id="glare"></div>
        </div>

        <form id="regForm" onsubmit="submitForm(event)">
            
            <div class="form-grid-2">
                <div class="input-group">
                    <label>TAG ID</label>
                    <input type="text" id="cTagID" class="gold-border" placeholder="26098" value="26098">
                </div>
                <div class="input-group">
                    <label>GATE PASS</label>
                    <input type="text" id="cGatePass" placeholder="TYPE IF NEEDED...">
                </div>
            </div>

            <div class="input-group">
                <label>CLIENT FULL NAME</label>
                <input type="text" id="cClient" placeholder="TYPE NAME HERE..." required>
            </div>
            
            <div id="boardsWrapper">
                <div class="main-board-data">
                    <div class="input-group">
                        <label>BOARD MODEL</label>
                        <input type="text" class="cModel" placeholder="ENTER MODEL" required>
                    </div>
                    
                    <div class="form-grid-2">
                        <div class="input-group">
                            <label>PART</label>
                            <input type="text" class="cPart" placeholder="">
                        </div>
                        <div class="input-group">
                            <label>SERIAL NO</label>
                            <input type="text" class="cSerial" placeholder="">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>ISSUE / FAULT</label>
                        <input type="text" class="cIssue" placeholder="">
                    </div>
                    
                    <div class="input-group">
                        <label>REMARKS</label>
                        <input type="text" class="cRemark" placeholder="">
                    </div>
                </div>
            </div>
            
            <button type="button" class="btn-attach" onclick="addNewBoardBlock()">+ ATTACH ANOTHER BOARD</button>
            
            <button type="submit" class="submit-btn" id="subBtn">🚀 SYNC DATA TO CLOUD</button>
        </form>
    </nav>

    <script>
        let boardCounter = 1;

        // ডার্ক এবং লাইট মোড ডায়নামিকলি টগল করার লজিক
        const themeBtn = document.getElementById("themeBtn");
        themeBtn.addEventListener("click", () => {
            const root = document.documentElement;
            const isDark = root.getAttribute("data-theme") === "dark";
            root.setAttribute("data-theme", isDark ? "light" : "dark");
        });

        // ইন্টারাক্টিভ অ্যাপল গ্লাস গ্লেয়ার (মাউস ট্র্যাকিং লাইট এফেক্ট)
        document.addEventListener("DOMContentLoaded", () => {
            const nav = document.getElementById("nav");
            const glare = document.getElementById("glare");

            nav.addEventListener("mousemove", (e) => {
                const rect = nav.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                glare.style.setProperty("--x", `${x}px`);
                glare.style.setProperty("--y", `${y}px`);
            });
        });

        // আরেকটি এক্সট্রা বোর্ড ব্লক অ্যাড করার মেথড
        function addNewBoardBlock() {
            boardCounter++;
            const wrapper = document.getElementById('boardsWrapper');
            
            const newBlock = document.createElement('div');
            newBlock.className = 'board-block';
            newBlock.id = `board_${boardCounter}`;
            
            newBlock.innerHTML = `
                <div class="board-header">
                    <span class="board-title">EXTRA BOARD PROFILE #${boardCounter}</span>
                    <button type="button" class="btn-cancel" onclick="removeBoardBlock(${boardCounter})">CANCEL</button>
                </div>
                
                <div class="input-group">
                    <label>BOARD MODEL</label>
                    <input type="text" class="cModel" placeholder="ENTER MODEL" required>
                </div>
                
                <div class="form-grid-2">
                    <div class="input-group">
                        <label>PART</label>
                        <input type="text" class="cPart" placeholder="">
                    </div>
                    <div class="input-group">
                        <label>SERIAL NO</label>
                        <input type="text" class="cSerial" placeholder="">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>ISSUE / FAULT</label>
                    <input type="text" class="cIssue" placeholder="">
                </div>
                
                <div class="input-group">
                    <label>REMARKS</label>
                    <input type="text" class="cRemark" placeholder="">
                </div>
            `;
            wrapper.appendChild(newBlock);
        }

        // ভুল করে ক্লিক করলে এক্সট্রা বোর্ড ক্যানসেল করার মেথড
        function removeBoardBlock(id) {
            const block = document.getElementById(`board_${id}`);
            if(block) {
                block.remove();
            }
        }

        // ফর্ম সাবমিশন লজিক
        function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.disabled = true;
            btn.innerText = "SYNCING TO CLOUD TERMINAL...";
            
            setTimeout(() => {
                alert("DATA SYNCED TO CLOUD SUCCESSFULLY!");
                document.getElementById('regForm').reset();
                
                // এক্সট্রা বোর্ড ব্লকগুলো সাবমিটের পর রিমুভ করে রিসেট করা
                const extraBlocks = document.querySelectorAll('.board-block');
                extraBlocks.forEach(b => b.remove());
                boardCounter = 1;
                
                btn.disabled = false;
                btn.innerText = "🚀 SYNC DATA TO CLOUD";
            }, 1200);
        }
    </script>
</body>
</html>
